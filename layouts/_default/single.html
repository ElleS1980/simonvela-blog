{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  <div class="meta">{{ .Date.Format "January 2, 2006" }} {{ with .Params.tags }}| {{ range . }}#{{ . }} {{ end }}{{ end }}</div>
  <div class="content">
    {{ .Content }}
  </div>
  {{ with .Params.tags }}
  <div class="tags" style="margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
    {{ range . }}<a href="/tags/{{ . | urlize }}" class="tag">{{ . }}</a>{{ end }}
  </div>
  {{ end }}
</article>
{{ end }}
